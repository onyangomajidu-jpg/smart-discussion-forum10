# Smart Discussion Forum — Desktop Client Configuration
# Location: java-gui/src/main/resources/app.properties

# Laravel backend URL (must match APP_URL in laravel/.env)
api.baseUrl=http://localhost:8000/api

# SQLite local cache file path (relative to working directory)
cache.db.path=data/local_cache.db

# Sync interval when online (seconds)
sync.interval=30

# HTTP timeouts (seconds)
http.connect.timeout=10
http.read.timeout=30
